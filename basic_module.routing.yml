basic_module.page:
  path: '/basic-module'
  defaults:
    _controller: '\Drupal\basic_module\Controller\BasicModuleController::page'
    _title: 'Basic Module Page'
  requirements:
    _permission: 'access content'

basic_module.form:
  path: '/basic-module'
  defaults:
    _controller: '\Drupal\basic_module\Form\BasicModuleForm::form'
    _title: 'Baic Form'
  requirements:
    _permission: 'access-content'

